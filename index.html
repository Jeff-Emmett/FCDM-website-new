<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Circle Digital Marketing - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a2647 0%, #144272 100%);
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        
        .logo-container {
            margin-bottom: 3rem;
        }
        
        .logo {
            max-width: 300px;
            height: auto;
        }
        
        .coming-soon {
            font-size: 3rem;
            font-weight: 700;
            margin: 2rem 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ffffff;
        }
        
        .description {
            max-width: 800px;
            margin: 0 auto 2rem;
            font-size: 1.2rem;
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .logo {
                max-width: 250px;
            }
            
            .coming-soon {
                font-size: 2rem;
            }
            
            .description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="/wp-content/uploads/2018/08/Full-Circle-Digital-Marketing-Logo-1-300x171.png" alt="Full Circle Digital Marketing Logo" class="logo">
        </div>
        
        <h2 class="coming-soon">Coming Soon</h2>
        
        <p class="description">
            We're currently updating our website to better serve you. 
            Our team is working hard to bring you a new and improved digital experience.
        </p>
        
        <div class="footer">
            <p>&copy; 2025 Full Circle Digital Marketing. All Rights Reserved.</p>
        </div>
    </div>
</body>
</html>
